name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: 'PHP ${{ matrix.php }} + Symfony ${{ matrix.symfony }}'
    runs-on: ubuntu-latest
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        include:
          # Symfony 6.X
          - php: '8.1'
            symfony: '6.4.*'
            geoip2: '~3.0'

          - php: '8.2'
            symfony: '6.4.*'
            geoip2: '~3.0'

          # Symfony 7.x
          - php: '8.2'
            symfony: '7.4.*'
            geoip2: '~3.0'

          - php: '8.3'
            symfony: '7.4.*'
            geoip2: '~3.0'

          # Symfony 8.x
          - php: '8.4'
            symfony: '8.0.*'
            geoip2: '~3.0'

          - php: '8.5'
            symfony: '8.0.*'
            geoip2: '~3.0'
            coverage: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure coverage driver
        id: coverage
        run: echo ::set-output name=driver::pcov

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: ${{ steps.coverage.outputs.driver }}
          tools: composer:v2

      - name: Install Symfony
        run: composer require symfony/symfony:"${{ matrix.symfony }}" --no-update

      - name: Install GeoIP2-php
        run: composer require geoip2/geoip2:"${{ matrix.geoip2 }}" --no-update

      - name: 'Install Composer dependencies (highest)'
        uses: 'ramsey/composer-install@v3'
        with:
          dependency-versions: 'highest'

      - name: Run Tests
        run: vendor/bin/phpunit --coverage-clover build/coverage-clover.xml

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyze --memory-limit=1G
